services:
  piper-sandbox:
    build:
      context: .
      args:
        PIPER_INSTALL_TARGET: ${PIPER_INSTALL_TARGET:-.[tts]}
    container_name: ${PIPER_CONTAINER_NAME:-piper-sandbox}
    restart: unless-stopped
    environment:
      PIPER_HOST: 0.0.0.0
      PIPER_PORT: ${PIPER_PORT:-8000}
      PIPER_SERVICE_MODE: ${PIPER_SERVICE_MODE:-both}
      PIPER_ENGINE_URL: ${PIPER_ENGINE_URL:-}
      PIPER_CORS_ORIGIN: ${PIPER_CORS_ORIGIN:-*}
      PIPER_MODELS_DIR: /app/models/piper
      PIPER_HF_BASE: ${PIPER_HF_BASE:-https://huggingface.co/rhasspy/piper-voices/resolve/main}
      PIPER_DEFAULT_MODEL: ${PIPER_DEFAULT_MODEL:-es_MX-ald-medium}
      PIPER_MODEL_NAMES: ${PIPER_MODEL_NAMES:-["es_MX-claude-high","es_MX-ald-medium","es_ES-carlfm-x_low"]}
      PIPER_CHUNKS_ENABLED: ${PIPER_CHUNKS_ENABLED:-false}
      PIPER_CHUNK_TARGET_CHARS: ${PIPER_CHUNK_TARGET_CHARS:-350}
      PIPER_CHUNK_MIN_CHARS: ${PIPER_CHUNK_MIN_CHARS:-120}
      PIPER_CHUNK_MAX_CHARS: ${PIPER_CHUNK_MAX_CHARS:-700}
    ports:
      - "${PIPER_HOST_PORT:-8000}:${PIPER_PORT:-8000}"
    volumes:
      - piper-models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:$$PIPER_PORT/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  piper-models:
